<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Tools Toolkit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body>
    <header>
        <div class="logo" onclick="app.showLanding()">PDF Tools Toolkit</div>
        <button class="theme-toggle" onclick="app.toggleTheme()" title="Toggle Theme">🌓</button>
    </header>

    <main>
        <div id="landing">
            <h2 class="section-title">🔧 Modify PDF</h2>
            <div class="grid" id="grid-modify"></div>
            
            <h2 class="section-title">📥 Convert to PDF</h2>
            <div class="grid" id="grid-to-pdf"></div>
            
            <h2 class="section-title">📤 Convert from PDF</h2>
            <div class="grid" id="grid-from-pdf"></div>
        </div>

        <div id="workspace">
            <div class="workspace-header">
                <button class="back-btn" onclick="app.showLanding()">← Back to Tools</button>
                <h2 id="workspace-title">Tool Name</h2>
            </div>
            
            <div id="workspace-content">
                <!-- Dropzone for file uploads -->
                <div id="file-dropzone" class="dropzone">
                    <div class="dropzone-icon">📄</div>
                    <h3>Drag & Drop files here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="file-input" style="display:none;">
                </div>
                
                <!-- Markdown Editor specific -->
                <div id="editor-wrapper" style="display:none;">
                    <div class="editor-container">
                        <textarea id="md-input" class="markdown-input" placeholder="Type Markdown here..."></textarea>
                        <div id="md-preview" class="markdown-preview"></div>
                    </div>
                </div>

                <!-- Print container for HTML -> PDF -->
                <div id="print-container" style="display:none;"></div>

                <!-- Tool specific controls dynamically injected -->
                <div id="tool-controls" class="tool-controls"></div>

                <!-- Preview Area for thumbnails/files -->
                <div id="file-list" class="file-list"></div>
                <div id="preview-area" class="preview-area"></div>

                <div id="status-message"></div>
                
                <button id="action-btn" class="btn" style="margin-top: 1rem; display: none;" onclick="app.executeTool()">
                    <span class="loader"></span>
                    <span id="action-btn-text">Execute</span>
                </button>
            </div>
        </div>
    </main>

    <script>
    const app = {
        currentTool: null,
        files: [],
        pdfDoc: null,
        thumbnails: [],
        selectedPages: new Set(),
        theme: 'dark',
        
        tools: [
            { id: 'compress', title: 'Compress PDF', desc: 'Reduce file size while optimizing for maximal PDF quality.', icon: '🗜️', category: 'modify', accepts: '.pdf', multiple: false },
            { id: 'merge', title: 'Merge PDF', desc: 'Combine multiple PDFs in the order you want with the easiest PDF merger available.', icon: '➕', category: 'modify', accepts: '.pdf', multiple: true },
            { id: 'remove', title: 'Remove Pages', desc: 'Remove pages from a PDF document to quickly clean it up.', icon: '🗑️', category: 'modify', accepts: '.pdf', multiple: false },
            { id: 'split', title: 'Split/Extract PDF', desc: 'Extract pages from your PDF or split each page into a separate PDF.', icon: '✂️', category: 'modify', accepts: '.pdf', multiple: false },
            { id: 'organize', title: 'Organize Pages', desc: 'Sort, add and delete PDF pages. Drag and drop the page thumbnails.', icon: '🔄', category: 'modify', accepts: '.pdf', multiple: false },
            
            { id: 'md-pdf', title: 'Markdown to PDF', desc: 'Write markdown and render it as a beautifully styled PDF.', icon: '📝', category: 'to-pdf', accepts: null, multiple: false },
            { id: 'word-pdf', title: 'Word to PDF', desc: 'Convert Word documents (.docx) to PDF.', icon: '📄', category: 'to-pdf', accepts: '.docx', multiple: false },
            { id: 'img-pdf', title: 'JPG to PDF', desc: 'Convert JPG, PNG or WEBP images to PDF.', icon: '🖼️', category: 'to-pdf', accepts: 'image/*', multiple: true },
            
            { id: 'pdf-word', title: 'PDF to Word', desc: 'Extract text from your PDF into an editable Word document (.docx).', icon: '📝', category: 'from-pdf', accepts: '.pdf', multiple: false },
            { id: 'pdf-images', title: 'PDF to Images', desc: 'Convert each page of your PDF into an image (JPG).', icon: '🖼️', category: 'from-pdf', accepts: '.pdf', multiple: false },
        ],

        init() {
            this.renderLanding();
            this.setupListeners();
        },

        toggleTheme() {
            this.theme = this.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', this.theme);
        },

        renderLanding() {
            const gridModify = document.getElementById('grid-modify');
            const gridToPdf = document.getElementById('grid-to-pdf');
            const gridFromPdf = document.getElementById('grid-from-pdf');
            
            gridModify.innerHTML = ''; gridToPdf.innerHTML = ''; gridFromPdf.innerHTML = '';

            this.tools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => this.openTool(tool.id);
                card.innerHTML = `
                    <div class="card-icon">${tool.icon}</div>
                    <div class="card-content">
                        <h3>${tool.title}</h3>
                        <p>${tool.desc}</p>
                    </div>
                `;
                if(tool.category === 'modify') gridModify.appendChild(card);
                else if(tool.category === 'to-pdf') gridToPdf.appendChild(card);
                else if(tool.category === 'from-pdf') gridFromPdf.appendChild(card);
            });
        },

        showLanding() {
            document.getElementById('landing').style.display = 'block';
            document.getElementById('workspace').style.display = 'none';
            this.resetWorkspace();
        },

        resetWorkspace() {
            this.currentTool = null;
            this.files = [];
            this.pdfDoc = null;
            this.thumbnails = [];
            this.selectedPages.clear();
            document.getElementById('file-list').innerHTML = '';
            document.getElementById('preview-area').innerHTML = '';
            document.getElementById('tool-controls').innerHTML = '';
            document.getElementById('tool-controls').classList.remove('active');
            document.getElementById('action-btn').style.display = 'none';
            this.setStatus('');
            document.getElementById('file-input').value = '';
        },

        openTool(toolId) {
            this.resetWorkspace();
            this.currentTool = this.tools.find(t => t.id === toolId);
            document.getElementById('landing').style.display = 'none';
            document.getElementById('workspace').style.display = 'flex';
            document.getElementById('workspace-title').innerText = this.currentTool.title;
            
            const dropzone = document.getElementById('file-dropzone');
            const editorWrapper = document.getElementById('editor-wrapper');
            const fileInput = document.getElementById('file-input');

            if (this.currentTool.id === 'md-pdf') {
                dropzone.style.display = 'none';
                editorWrapper.style.display = 'block';
                document.getElementById('action-btn').style.display = 'inline-flex';
                document.getElementById('action-btn-text').innerText = 'Save as PDF';
                
                // init marked preview
                const input = document.getElementById('md-input');
                const preview = document.getElementById('md-preview');
                input.oninput = () => { preview.innerHTML = marked.parse(input.value); };
                input.value = '# Hello PDF\n\nStart typing markdown here...';
                input.oninput();
            } else {
                dropzone.style.display = 'block';
                editorWrapper.style.display = 'none';
                fileInput.accept = this.currentTool.accepts;
                fileInput.multiple = this.currentTool.multiple;
            }

            this.setupToolControls();
        },

        setupToolControls() {
            const controls = document.getElementById('tool-controls');
            let html = '';
            
            if (this.currentTool.id === 'compress') {
                html = `
                    <div class="control-group">
                        <label>Compression Level</label>
                        <select id="compress-level">
                            <option value="high">High Quality (Less Compression)</option>
                            <option value="medium" selected>Medium Quality</option>
                            <option value="low">Low Quality (More Compression)</option>
                        </select>
                    </div>
                `;
            } else if (this.currentTool.id === 'split') {
                html = `
                    <div class="control-group">
                        <label>Extraction Mode</label>
                        <select id="split-mode">
                            <option value="extract">Extract Selected Pages</option>
                            <option value="split">Split Selected Pages into Individual Files</option>
                        </select>
                    </div>
                `;
            }
            
            if (html) {
                controls.innerHTML = html;
                controls.classList.add('active');
            }
        },

        setupListeners() {
            const dropzone = document.getElementById('file-dropzone');
            const fileInput = document.getElementById('file-input');

            dropzone.onclick = () => fileInput.click();
            
            dropzone.ondragover = (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            };
            dropzone.ondragleave = () => dropzone.classList.remove('dragover');
            dropzone.ondrop = (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                this.handleFiles(e.dataTransfer.files);
            };

            fileInput.onchange = (e) => this.handleFiles(e.target.files);
        },

        async handleFiles(fileList) {
            if (!fileList.length) return;
            
            if (!this.currentTool.multiple) {
                this.files = [fileList[0]];
            } else {
                this.files = [...this.files, ...Array.from(fileList)];
            }

            this.setStatus('Processing files...', 'info');

            if (this.currentTool.id === 'merge' || this.currentTool.id === 'img-pdf') {
                this.renderFileList();
                document.getElementById('action-btn').style.display = 'inline-flex';
                document.getElementById('action-btn-text').innerText = this.currentTool.title;
                this.setStatus('');
            } else if (['remove', 'split', 'organize'].includes(this.currentTool.id)) {
                await this.renderPDFThumbnails(this.files[0]);
                document.getElementById('action-btn').style.display = 'inline-flex';
                document.getElementById('action-btn-text').innerText = this.currentTool.title;
            } else {
                document.getElementById('file-list').innerHTML = `<div class="file-item"><span>${this.files[0].name}</span></div>`;
                document.getElementById('action-btn').style.display = 'inline-flex';
                document.getElementById('action-btn-text').innerText = this.currentTool.title;
                this.setStatus('');
            }
        },

        renderFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            this.files.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item draggable';
                item.draggable = true;
                item.dataset.index = index;
                item.innerHTML = `
                    <span>☰ ${file.name}</span>
                    <button class="file-item-remove" onclick="event.stopPropagation(); app.removeFile(${index})">✕</button>
                `;
                
                item.ondragstart = (e) => e.dataTransfer.setData('text/plain', index);
                item.ondragover = (e) => e.preventDefault();
                item.ondrop = (e) => {
                    e.preventDefault();
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIndex = index;
                    const moved = this.files.splice(fromIndex, 1)[0];
                    this.files.splice(toIndex, 0, moved);
                    this.renderFileList();
                };
                
                list.appendChild(item);
            });
        },

        removeFile(index) {
            this.files.splice(index, 1);
            this.renderFileList();
            if (this.files.length === 0) {
                document.getElementById('action-btn').style.display = 'none';
            }
        },

        async renderPDFThumbnails(file) {
            try {
                this.setStatus('Rendering pages...', 'info');
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const previewArea = document.getElementById('preview-area');
                previewArea.innerHTML = '';
                this.thumbnails = [];
                this.selectedPages.clear();

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 0.5 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    const thumb = document.createElement('div');
                    thumb.className = 'page-thumbnail draggable';
                    if (this.currentTool.id === 'organize') thumb.draggable = true;
                    thumb.dataset.page = i;
                    thumb.innerHTML = `<span class="page-num">${i}</span>`;
                    thumb.appendChild(canvas);

                    if (['remove', 'split'].includes(this.currentTool.id)) {
                        thumb.onclick = () => {
                            thumb.classList.toggle('selected');
                            if (thumb.classList.contains('selected')) {
                                this.selectedPages.add(i);
                            } else {
                                this.selectedPages.delete(i);
                            }
                        };
                    }

                    if (this.currentTool.id === 'organize') {
                        thumb.ondragstart = (e) => {
                            e.dataTransfer.setData('text/plain', i);
                        };
                        thumb.ondragover = (e) => e.preventDefault();
                        thumb.ondrop = (e) => {
                            e.preventDefault();
                            const fromPage = parseInt(e.dataTransfer.getData('text/plain'));
                            const toPage = i;
                            this.reorderThumbnails(fromPage, toPage);
                        };
                    }

                    previewArea.appendChild(thumb);
                    this.thumbnails.push({ pageNum: i, element: thumb });
                }
                this.setStatus('');
            } catch (error) {
                this.setStatus('Error rendering PDF: ' + error.message, 'error');
            }
        },

        reorderThumbnails(fromPage, toPage) {
            const previewArea = document.getElementById('preview-area');
            const fromIndex = this.thumbnails.findIndex(t => t.pageNum === fromPage);
            const toIndex = this.thumbnails.findIndex(t => t.pageNum === toPage);
            
            const moved = this.thumbnails.splice(fromIndex, 1)[0];
            this.thumbnails.splice(toIndex, 0, moved);
            
            previewArea.innerHTML = '';
            this.thumbnails.forEach(t => previewArea.appendChild(t.element));
        },

        setStatus(msg, type = 'info') {
            const el = document.getElementById('status-message');
            el.innerText = msg;
            el.className = `status-${type}`;
        },

        setLoading(isLoading) {
            const btn = document.getElementById('action-btn');
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        },

        downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        },

        async executeTool() {
            if (this.currentTool.id !== 'md-pdf' && this.files.length === 0) {
                this.setStatus('Please upload a file first.', 'error');
                return;
            }
            
            this.setLoading(true);
            this.setStatus('Processing...', 'info');

            try {
                switch (this.currentTool.id) {
                    case 'compress': await this.compressPDF(); break;
                    case 'merge': await this.mergePDF(); break;
                    case 'remove': await this.removePages(); break;
                    case 'split': await this.splitPDF(); break;
                    case 'organize': await this.organizePages(); break;
                    case 'md-pdf': await this.markdownToPdf(); break;
                    case 'word-pdf': await this.wordToPdf(); break;
                    case 'img-pdf': await this.imgToPdf(); break;
                    case 'pdf-word': await this.pdfToWord(); break;
                    case 'pdf-images': await this.pdfToImages(); break;
                }
                this.setStatus('Done!', 'success');
            } catch (err) {
                console.error(err);
                this.setStatus('Error: ' + err.message, 'error');
            }
            
            this.setLoading(false);
        },

        async compressPDF() {
            // Re-render pages as JPEGs to compress (since extracting images via pdf-lib is extremely complex purely client-side)
            const level = document.getElementById('compress-level').value;
            let scale = 1.5;
            let quality = 0.8;
            if (level === 'high') { scale = 2.0; quality = 0.9; }
            if (level === 'low') { scale = 1.0; quality = 0.5; }

            const file = this.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            const newPdf = await PDFLib.PDFDocument.create();

            for (let i = 1; i <= pdf.numPages; i++) {
                this.setStatus(`Compressing page ${i} of ${pdf.numPages}...`, 'info');
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;

                const imgData = canvas.toDataURL('image/jpeg', quality);
                const jpgImage = await newPdf.embedJpg(imgData);
                const newPage = newPdf.addPage([viewport.width, viewport.height]);
                newPage.drawImage(jpgImage, {
                    x: 0, y: 0, width: viewport.width, height: viewport.height
                });
            }

            const pdfBytes = await newPdf.save();
            this.downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), `compressed_${file.name}`);
        },

        async mergePDF() {
            const mergedPdf = await PDFLib.PDFDocument.create();
            for (let i = 0; i < this.files.length; i++) {
                this.setStatus(`Merging file ${i + 1} of ${this.files.length}...`, 'info');
                const fileBuf = await this.files[i].arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(fileBuf);
                const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                copiedPages.forEach((page) => mergedPdf.addPage(page));
            }
            const pdfBytes = await mergedPdf.save();
            this.downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), `merged.pdf`);
        },

        async removePages() {
            if (this.selectedPages.size === 0) throw new Error("No pages selected to remove.");
            const fileBuf = await this.files[0].arrayBuffer();
            const pdf = await PDFLib.PDFDocument.load(fileBuf);
            
            // Remove from the end to avoid index shifting
            const pagesToRemove = Array.from(this.selectedPages).sort((a,b) => b - a);
            pagesToRemove.forEach(p => pdf.removePage(p - 1));

            const pdfBytes = await pdf.save();
            this.downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), `removed_${this.files[0].name}`);
        },

        async splitPDF() {
            if (this.selectedPages.size === 0) throw new Error("No pages selected.");
            const mode = document.getElementById('split-mode').value;
            const fileBuf = await this.files[0].arrayBuffer();
            const pdf = await PDFLib.PDFDocument.load(fileBuf);
            const selectedArr = Array.from(this.selectedPages).sort((a,b) => a - b);

            if (mode === 'extract') {
                const newPdf = await PDFLib.PDFDocument.create();
                const copiedPages = await newPdf.copyPages(pdf, selectedArr.map(p => p - 1));
                copiedPages.forEach((page) => newPdf.addPage(page));
                const pdfBytes = await newPdf.save();
                this.downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), `extracted_${this.files[0].name}`);
            } else {
                const zip = new JSZip();
                for (let i = 0; i < selectedArr.length; i++) {
                    const pageNum = selectedArr[i];
                    const newPdf = await PDFLib.PDFDocument.create();
                    const [copiedPage] = await newPdf.copyPages(pdf, [pageNum - 1]);
                    newPdf.addPage(copiedPage);
                    const pdfBytes = await newPdf.save();
                    zip.file(`page_${pageNum}.pdf`, pdfBytes);
                }
                const content = await zip.generateAsync({ type: 'blob' });
                this.downloadBlob(content, `split_${this.files[0].name}.zip`);
            }
        },

        async organizePages() {
            const fileBuf = await this.files[0].arrayBuffer();
            const pdf = await PDFLib.PDFDocument.load(fileBuf);
            const newPdf = await PDFLib.PDFDocument.create();
            
            const newOrder = this.thumbnails.map(t => t.pageNum - 1);
            const copiedPages = await newPdf.copyPages(pdf, newOrder);
            copiedPages.forEach((page) => newPdf.addPage(page));
            
            const pdfBytes = await newPdf.save();
            this.downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), `organized_${this.files[0].name}`);
        },

        async markdownToPdf() {
            const htmlContent = document.getElementById('md-preview').innerHTML;
            this.printHtmlToPdf(htmlContent, 'markdown_document');
        },

        async wordToPdf() {
            const file = this.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
            this.printHtmlToPdf(result.value, file.name.replace('.docx', ''));
        },

        printHtmlToPdf(htmlContent, filename) {
            const printContainer = document.getElementById('print-container');
            printContainer.innerHTML = `<div style="padding: 2cm;">${htmlContent}</div>`;
            document.title = filename; // Sets default save name in print dialog
            window.print();
            document.title = "PDF Tools Toolkit";
        },

        async imgToPdf() {
            const pdf = await PDFLib.PDFDocument.create();
            for (let i = 0; i < this.files.length; i++) {
                const file = this.files[i];
                const arrayBuffer = await file.arrayBuffer();
                let image;
                if (file.type === 'image/jpeg' || file.type === 'image/jpg') {
                    image = await pdf.embedJpg(arrayBuffer);
                } else if (file.type === 'image/png') {
                    image = await pdf.embedPng(arrayBuffer);
                } else {
                    this.setStatus(`Unsupported image format: ${file.name}. Converting via canvas...`, 'info');
                    // Canvas fallback for WEBP, etc
                    image = await new Promise((resolve) => {
                        const img = new Image();
                        img.onload = async () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width; canvas.height = img.height;
                            canvas.getContext('2d').drawImage(img, 0, 0);
                            const dataUrl = canvas.toDataURL('image/png');
                            const res = await fetch(dataUrl);
                            const buf = await res.arrayBuffer();
                            resolve(await pdf.embedPng(buf));
                        };
                        img.src = URL.createObjectURL(file);
                    });
                }
                
                const page = pdf.addPage([image.width, image.height]);
                page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
            }
            const pdfBytes = await pdf.save();
            this.downloadBlob(new Blob([pdfBytes], { type: 'application/pdf' }), `images.pdf`);
        },

        async pdfToWord() {
            const file = this.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            const paragraphs = [];
            
            for (let i = 1; i <= pdf.numPages; i++) {
                this.setStatus(`Extracting text from page ${i}...`, 'info');
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                let pageText = '';
                let lastY = -1;
                textContent.items.forEach(item => {
                    if (lastY !== item.transform[5] && lastY !== -1) {
                        pageText += '\n';
                    }
                    pageText += item.str;
                    lastY = item.transform[5];
                });
                
                pageText.split('\n').forEach(line => {
                    if (line.trim().length > 0) {
                        paragraphs.push(new docx.Paragraph({
                            children: [new docx.TextRun(line)],
                        }));
                    }
                });
                if (i < pdf.numPages) {
                    paragraphs.push(new docx.Paragraph({
                        children: [new docx.PageBreak()],
                    }));
                }
            }

            const doc = new docx.Document({
                sections: [{
                    properties: {},
                    children: paragraphs
                }]
            });

            const blob = await docx.Packer.toBlob(doc);
            this.downloadBlob(blob, `${file.name.replace('.pdf', '')}.docx`);
        },

        async pdfToImages() {
            const file = this.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const zip = new JSZip();

            for (let i = 1; i <= pdf.numPages; i++) {
                this.setStatus(`Rendering page ${i}...`, 'info');
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 }); // higher quality
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;

                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                const base64Data = dataUrl.split(',')[1];
                zip.file(`page_${i}.jpg`, base64Data, { base64: true });
            }

            this.setStatus('Zipping images...', 'info');
            const content = await zip.generateAsync({ type: 'blob' });
            this.downloadBlob(content, `${file.name.replace('.pdf', '')}_images.zip`);
        }
    };

    window.onload = () => app.init();
    </script>
</body>
</html>
